<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <clipPath id="av">
      <circle cx="40" cy="40" r="40"/>
    </clipPath>
  </defs>
  <g clip-path="url(#av)">
    <!-- background -->
    <circle cx="40" cy="40" r="40" fill="#EDE5DA"/>

    <!-- shirt / torso dark teal -->
    <path d="M4 80 Q4 62 24 59 L30 66 L40 73 L50 66 L56 59 Q76 62 76 80Z" fill="#2B3F38"/>
    <!-- collar white -->
    <path d="M33 59 L40 69 L47 59" fill="#FFFDF9" opacity="0.92"/>
    <path d="M36.5 59 L40 64.5 L43.5 59" fill="#2B3F38"/>

    <!-- neck -->
    <path d="M34.5 54 Q33.5 63 40 65 Q46.5 63 45.5 54Z" fill="#C9905E"/>

    <!-- head -->
    <ellipse cx="40" cy="34" rx="18" ry="21" fill="#C9905E"/>

    <!-- hair – dark brown, short, covers top and sides -->
    <path d="M22.5 30 Q22 13 40 11 Q58 13 57.5 30 Q56 19 47 15 Q40 12 33 15 Q24 19 22.5 30Z" fill="#1C0F08"/>
    <ellipse cx="40" cy="18" rx="18.5" ry="8" fill="#1C0F08"/>
    <path d="M22.5 30 Q22 39 23.5 45" stroke="#1C0F08" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M57.5 30 Q58 39 56.5 45" stroke="#1C0F08" stroke-width="4.5" fill="none" stroke-linecap="round"/>

    <!-- ears -->
    <ellipse cx="22.5" cy="36" rx="3.5" ry="5" fill="#B87A48"/>
    <ellipse cx="57.5" cy="36" rx="3.5" ry="5" fill="#B87A48"/>

    <!-- eye whites -->
    <ellipse cx="32" cy="34" rx="5" ry="5.5" fill="#FEFEFE"/>
    <ellipse cx="48" cy="34" rx="5" ry="5.5" fill="#FEFEFE"/>

    <!-- iris -->
    <circle cx="32.5" cy="35" r="3.5" fill="#2A160A"/>
    <circle cx="48.5" cy="35" r="3.5" fill="#2A160A"/>

    <!-- pupil -->
    <circle cx="33" cy="35.3" r="2" fill="#0A0604"/>
    <circle cx="49" cy="35.3" r="2" fill="#0A0604"/>

    <!-- highlight -->
    <circle cx="34" cy="33.5" r="1.2" fill="white"/>
    <circle cx="50" cy="33.5" r="1.2" fill="white"/>

    <!-- eyebrows – natural, slightly expressive -->
    <path d="M26 27.5 Q32 25.5 37 27.5" stroke="#1C0F08" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M43 27.5 Q48 25.5 54 27.5" stroke="#1C0F08" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- nose -->
    <path d="M38 41 Q40 45.5 42 41" stroke="#A86A38" stroke-width="1.4" fill="none" stroke-linecap="round"/>

    <!-- smile – warm, genuine -->
    <path d="M32.5 49 Q40 56 47.5 49" stroke="#8C4A28" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- cheek warmth -->
    <ellipse cx="25" cy="44" rx="5.5" ry="3.5" fill="#D87858" opacity="0.15"/>
    <ellipse cx="55" cy="44" rx="5.5" ry="3.5" fill="#D87858" opacity="0.15"/>
  </g>
</svg>
